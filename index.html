<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Music Player</title>
  <link rel="stylesheet" href="./css/style.css?v=8">
</head>
<body>
  <main class="music-app">
    <section class="app-card" aria-label="음악 플레이어">
      <header class="app-header">
        <div>
          <p class="eyebrow">Private Library</p>
          <h1>My Music Player</h1>
        </div>
        <div class="status-pill">GitHub Pages Ready</div>
      </header>

      <section class="player-layout">
        <div class="now-playing-panel">
          <div id="cover-stage" class="cover-stage">
            <div id="cover-disc" class="cover-disc" aria-hidden="true">
              <div class="disc-face"></div>
            </div>
            <div id="cover-art" class="cover-art" aria-label="앨범 커버"></div>
          </div>

          <div class="track-info">
            <p class="eyebrow">Now Playing</p>
            <h2 id="track-title">My Music Player</h2>
            <p id="track-artist">검정치마</p>
          </div>

          <div class="progress-area">
            <div class="time-row">
              <span id="current-time">0:00</span>
              <span id="duration">0:00</span>
            </div>
            <input id="progress-bar" class="progress-bar" type="range" min="0" max="100" value="0" aria-label="재생 위치">
          </div>

          <div class="controls" aria-label="재생 컨트롤">
            <button id="prev-button" class="icon-button" type="button" aria-label="이전 곡">⏮</button>
            <button id="play-button" class="play-button" type="button" aria-label="재생">▶</button>
            <button id="next-button" class="icon-button" type="button" aria-label="다음 곡">⏭</button>
          </div>

          <button id="repeat-button" class="repeat-button" type="button" aria-label="반복 모드 변경">반복 끔</button>

          <label class="volume-control" for="volume-slider">
            <span>Volume</span>
            <input id="volume-slider" type="range" min="0" max="1" step="0.01" value="0.8">
          </label>
        </div>

        <aside class="playlist-panel" aria-labelledby="playlist-title">
          <div class="playlist-header">
            <div>
              <p class="eyebrow">Albums</p>
              <h2 id="playlist-title">앨범 라이브러리</h2>
            </div>
            <span id="song-count" class="song-count">0 songs</span>
          </div>

          <div class="album-section">
            <p class="eyebrow">Albums</p>
            <div id="album-list" class="album-list"></div>
          </div>
        </aside>
      </section>
    </section>
  </main>

  <script src="./js/player.js?v=8"></script>
</body>
</html>
